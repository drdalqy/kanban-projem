<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Renkli Mobil Kanban</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --column-bg: #e2e4e6;
            --card-text: #333;
            --primary-btn: #28a745;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            margin: 0;
            padding: 15px; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .board { 
            display: flex; 
            gap: 20px; 
            width: 100%; 
            max-width: 1200px;
        }

        /* MOBİL UYUM: Ekran küçükse sütunları alt alta diz */
        @media (max-width: 768px) {
            .board {
                flex-direction: column;
            }
            .column {
                width: 100% !important;
                min-height: auto !important;
            }
        }

        .column { 
            background: var(--column-bg); 
            border-radius: 12px; 
            width: 33.33%; 
            min-height: 85vh; 
            padding: 15px; 
            display: flex; 
            flex-direction: column;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .column h3 { 
            text-align: center; 
            color: #444; 
            margin: 0 0 10px 0;
            padding-bottom: 8px;
            border-bottom: 2px solid #ccc;
        }

        .cards-container { 
            flex-grow: 1; 
            min-height: 80px; 
            margin-top: 5px;
        }

        .card { 
            border-radius: 8px; 
            padding: 15px; 
            margin-bottom: 12px; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.15); 
            cursor: grab; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-word;
            color: var(--card-text);
        }

        .delete-btn { 
            cursor: pointer; 
            color: rgba(0,0,0,0.4); 
            font-weight: bold; 
            border: none; 
            background: none; 
            font-size: 20px;
            padding-left: 10px;
        }

        .add-btn { 
            background: var(--primary-btn); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            padding: 14px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="board">
    <div class="column" id="todo">
        <h3>YAPILACAKLAR</h3>
        <div class="cards-container" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        <button class="add-btn" onclick="addCard('todo')">+ Kart Ekle</button>
    </div>

    <div class="column" id="doing">
        <h3>YAPIYORUM</h3>
        <div class="cards-container" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>

    <div class="column" id="done">
        <h3>YAPTIM</h3>
        <div class="cards-container" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    </div>
</div>

<script>
    const cardColors = ['#FFEBEE', '#E3F2FD', '#E8F5E9', '#FFFDE7', '#F3E5F5', '#E0F7FA', '#FFF3E0'];

    window.onload = loadCards;

    function allowDrop(ev) { ev.preventDefault(); }

    function drag(ev) {
        ev.dataTransfer.setData("text", ev.target.id);
    }

    function drop(ev) {
        ev.preventDefault();
        var data = ev.dataTransfer.getData("text");
        var card = document.getElementById(data);
        let target = ev.target;
        if (!target.classList.contains('cards-container')) {
            target = target.closest('.column').querySelector('.cards-container');
        }
        target.appendChild(card);
        saveCards();
    }

    function addCard(columnId) {
        var text = prompt("Ne yapacaksın?");
        if (text && text.trim() !== "") {
            createCard(text, columnId);
            saveCards();
        }
    }

    function createCard(text, columnId, cardId = null, color = null) {
        var container = document.getElementById(columnId).querySelector('.cards-container');
        var card = document.createElement("div");
        card.className = "card";
        card.id = cardId || "card-" + Date.now();
        card.draggable = true;
        card.ondragstart = drag;
        card.style.backgroundColor = color || cardColors[Math.floor(Math.random() * cardColors.length)];
        card.innerHTML = `<span>${text}</span><button class="delete-btn" onclick="deleteCard('${card.id}')">&times;</button>`;
        container.appendChild(card);
    }

    function deleteCard(id) {
        if(confirm("Silmek istiyor musun?")) {
            document.getElementById(id).remove();
            saveCards();
        }
    }

    function saveCards() {
        let data = { todo: [], doing: [], done: [] };
        document.querySelectorAll('.column').forEach(col => {
            col.querySelectorAll('.card').forEach(card => {
                data[col.id].push({ id: card.id, text: card.querySelector('span').innerText, color: card.style.backgroundColor });
            });
        });
        localStorage.setItem('myFinalKanban', JSON.stringify(data));
    }

    function loadCards() {
        const data = JSON.parse(localStorage.getItem('myFinalKanban'));
        if (data) {
            Object.keys(data).forEach(colId => {
                data[colId].forEach(card => createCard(card.text, colId, card.id, card.color));
            });
        }
    }
</script>

</body>
</html>
